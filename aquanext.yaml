################################################################################
# Chaffoteaux AquaNext / Ariston Nuos - ESPHome Configuration
# Protocole Janus2 (carte mère <-> IHM, TTL 5V, 9600 8N1)
#
# Câblage validé (via ADUM1201, isolation galvanique) :
#   WROOM GPIO17 (RX) ──► ADUM1201 VOA → VIB ──► PIN1 TX RJ12 carte mère
#   WROOM GPIO16 (TX) ◄── ADUM1201 VIA ← VOB ◄── PIN2 RX RJ12 carte mère
#   3.3V WROOM ──► ADUM1201 VDD2 / GND WROOM ──► ADUM1201 GND2
#   5V RJ12 Pin3 ──► ADUM1201 VDD1 / GND RJ12 Pin4 ──► ADUM1201 GND1
#   GND1 et GND2 séparés (isolation galvanique préservée)
################################################################################

substitutions:
  # ===== Identité =====
  name: aquanext-ext250
  friendly_name: "Aquanext Chaffoteaux Ext250 Interface"
  sensor_prefix: "Aquanext"
  device_description: "Uart Interface Pour Carte Mère Janus 2"
  # ===== Projet =====
  projectname: "Aquanext.EXt250"
  appversion: "1.1.0"
  # ===== Réseau =====
  adress_ip: !secret ip_aquanext
  gateway_ip: !secret ip_gateway
  dns_ip:     !secret ip_dns
  # ===== Sécurité =====
  ota_pswd:   !secret ota_pswd
  ap_pwd:     !secret ota_pswd
  # ===== Système =====
  time_timezone: "Europe/Paris"
  time_id:       ha_time
  time_platform: homeassistant
  log_level:     DEBUG
  baud_ratelog:  "0"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: ${device_description}
  project:
    name: ${projectname}
    version: ${appversion}

esp32:
  board: esp32dev
  framework:
    type: arduino

# ---- Fichier commun (wifi, api, ota, logger, time, web_server...) ----
<<: !include .commonv2.yaml

# ---- Composant externe depuis GitHub ----
external_components:
  - source:
      type: git
      url: https://github.com/patmtp35/Esphome_Aquanex_Ext250
      ref: main
    components: [aquanext]

# ---- Bus UART Janus2 (9600 8N1, TTL 5V via ADUM1201) ----
# GPIO16=TX et GPIO17=RX (inversé par rapport au standard, validé sur ton câblage)
uart:
  id: uart_janus
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1

# ---- LED status WROOM (GPIO2 = LED bleue intégrée) ----
# clignote rapidement = pas de WiFi / boot
# fixe = connecté et opérationnel
status_led:
  pin:
    number: GPIO2

# ---- Rafraîchissement automatique ----
interval:
  - interval: 60s
    then:
      - lambda: id(ballon).request_all_temps();

  - interval: 300s
    then:
      - lambda: id(ballon).request_status();

# ---- Composant principal AquaNext ----
aquanext:
  id: ballon
  uart_id: uart_janus

  # --- Températures ---
  temperature_target:
    name: "${sensor_prefix} - Température consigne"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  temperature_dome:
    name: "${sensor_prefix} - Température dôme"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  temperature_air:
    name: "${sensor_prefix} - Température air entrée"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  temperature_evap:
    name: "${sensor_prefix} - Température évaporateur"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  temperature_tw1:
    name: "${sensor_prefix} - Sonde eau TW1"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  temperature_tw2:
    name: "${sensor_prefix} - Sonde eau TW2"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  temperature_t_hp:
    name: "${sensor_prefix} - Température sortie PAC"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement

  temperature_t_max:
    name: "${sensor_prefix} - Température max"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature

  temperature_t_min:
    name: "${sensor_prefix} - Température min"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature

  # --- Compteurs horaires ---
  hp_hours:
    name: "${sensor_prefix} - Heures PAC"
    unit_of_measurement: "h"
    accuracy_decimals: 0
    icon: mdi:heat-pump
    state_class: total_increasing

  he_hours:
    name: "${sensor_prefix} - Heures résistance"
    unit_of_measurement: "h"
    accuracy_decimals: 0
    icon: mdi:heating-coil
    state_class: total_increasing

  # --- Capteurs texte ---
  mode:
    name: "${sensor_prefix} - Mode fonctionnement"
    icon: mdi:water-boiler

  fw_version:
    name: "${sensor_prefix} - Version firmware"
    icon: mdi:chip

  # --- Capteurs binaires ---
  power:
    name: "${sensor_prefix} - Allumé"
    device_class: power

  heat_pump_active:
    name: "${sensor_prefix} - PAC active"
    icon: mdi:heat-pump

  heat_element_active:
    name: "${sensor_prefix} - Résistance active"
    icon: mdi:heating-coil

  error_present:
    name: "${sensor_prefix} - Erreur présente"
    device_class: problem

  setting_antibact:
    name: "${sensor_prefix} - Anti-bactérien"
    icon: mdi:bacteria-outline

  setting_green:
    name: "${sensor_prefix} - Mode green"
    icon: mdi:leaf

  setting_voyage:
    name: "${sensor_prefix} - Mode voyage"
    icon: mdi:airplane

# ---- Sélecteur de mode ----
select:
  - platform: template
    name: "${sensor_prefix} - Mode de chauffe"
    id: select_mode
    icon: mdi:water-boiler
    options:
      - "boost"
      - "green"
      - "voyage"
    initial_option: "green"
    optimistic: true
    on_value:
      then:
        - lambda: id(ballon).set_mode(x);

# ---- Switches ----
switch:
  - platform: template
    name: "${sensor_prefix} - Marche Arret"
    id: switch_power
    icon: mdi:power
    optimistic: true
    turn_on_action:
      - lambda: id(ballon).set_power(true);
    turn_off_action:
      - lambda: id(ballon).set_power(false);

  - platform: template
    name: "${sensor_prefix} - Anti-bactérien"
    id: switch_antibact
    icon: mdi:bacteria-outline
    optimistic: true
    turn_on_action:
      - lambda: id(ballon).set_antibact(true);
    turn_off_action:
      - lambda: id(ballon).set_antibact(false);

# ---- Curseur température cible ----
number:
  - platform: template
    name: "${sensor_prefix} - Température cible"
    id: number_target_temp
    icon: mdi:thermometer-water
    min_value: 30
    max_value: 65
    step: 1
    unit_of_measurement: "°C"
    optimistic: true
    set_action:
      - lambda: id(ballon).set_target_temp(x);

# ---- Boutons d'action ----
button:
  - platform: template
    name: "${sensor_prefix} - Rafraîchir températures"
    icon: mdi:thermometer-refresh
    on_press:
      - lambda: id(ballon).request_all_temps();

  - platform: template
    name: "${sensor_prefix} - Rafraîchir statut"
    icon: mdi:refresh
    on_press:
      - lambda: id(ballon).request_status();
